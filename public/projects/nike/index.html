<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nike - Women's Shop | Designed by Kyrillos George</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#bbb;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow-x:hidden}

/* Card */
.card{width:min(1100px,95vw);height:min(620px,80vh);border-radius:12px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.35);display:grid;grid-template-columns:38% 62%;position:relative}

/* LEFT - Black */
.left{background:#000;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:36px}
.nike-logo{width:64px}
.nike-logo svg{fill:#fff;width:100%}
.social{display:flex;gap:16px}
.social a{color:#666;text-decoration:none;font-size:.7rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:.3s}
.social a:hover{color:#fff}

/* RIGHT - White */
.right{background:#fff;display:flex;flex-direction:column;position:relative;padding:32px 44px}

/* Nav */
.nav-top{display:flex;justify-content:space-between;align-items:center}
.nav-menu{display:flex;gap:20px;list-style:none}
.nav-menu a{color:#111;text-decoration:none;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;transition:.3s;display:flex;align-items:center;gap:3px}
.nav-menu a.active{text-decoration:underline;text-underline-offset:4px}
.nav-menu .arr{font-size:.55rem;color:#888}
.nav-icons{display:flex;align-items:center;gap:12px}
.icon-btn{cursor:pointer;background:none;border:none;color:#111;display:flex;align-items:center}
.icon-btn:hover{opacity:.5}
.hamburger-btn{width:36px;height:36px;border-radius:50%;background:#111;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hamburger-btn svg{fill:#fff}

/* Content */
.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding-left:100px}
.content-label{font-size:.82rem;font-style:italic;color:#777;margin-bottom:2px}
.content-title{font-size:5rem;font-weight:900;color:#111;line-height:.85;letter-spacing:-2px;margin-bottom:18px;font-style:italic}
.content-desc{font-size:.6rem;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:2.5px;line-height:2;max-width:300px;margin-bottom:24px}
.shop-btn{display:inline-block;padding:14px 44px;background:#111;color:#fff;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;cursor:pointer;border:none;transition:.3s;width:fit-content}
.shop-btn:hover{background:#333}

/* Thumbnails */
.thumbs{display:flex;align-items:center;gap:12px;margin-top:24px}
.thumb-arrow{font-size:1.1rem;color:#ccc;cursor:pointer;background:none;border:none;transition:.3s;padding:4px}
.thumb-arrow:hover{color:#111}
.thumb{width:65px;height:50px;border-radius:6px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid transparent;transition:.3s;overflow:hidden}
.thumb.active{border-color:#111}
.thumb img{width:55px;height:40px;object-fit:cover;border-radius:3px}

/* YELLOW CIRCLE + SHOE */
.shoe-hero{position:absolute;z-index:10;left:38%;top:50%;transform:translate(-50%,-50%)}
.yellow-circle{width:320px;height:320px;border-radius:50%;background:#f0b429;position:relative;box-shadow:0 15px 50px rgba(240,180,41,0.35)}
.shoe-img{width:130%;height:auto;position:absolute;top:45%;left:45%;transform:translate(-50%,-50%) rotate(-20deg);filter:drop-shadow(0 20px 30px rgba(0,0,0,0.5));transition:transform .4s}
.shoe-hero:hover .shoe-img{transform:translate(-50%,-50%) rotate(-17deg) scale(1.03)}

/* Back button */
.back-link{position:fixed;bottom:20px;right:20px;padding:10px 22px;background:#6c63ff;color:#fff;border-radius:100px;font-size:.82rem;font-weight:600;text-decoration:none;z-index:100;transition:.3s;box-shadow:0 4px 16px rgba(108,99,255,.4)}
.back-link:hover{transform:scale(1.05)}

@media(max-width:900px){
  body{padding:16px;align-items:flex-start}
  .card{grid-template-columns:1fr;height:auto;width:100%}
  .left{padding:20px;min-height:90px;flex-direction:row;align-items:center;justify-content:space-between}
  .right{padding:20px}
  .content{padding-left:0;margin-top:100px}
  .content-title{font-size:3rem}
  .shoe-hero{left:50%;top:180px;transform:translate(-50%,0)}
  .yellow-circle{width:200px;height:200px}
  .nav-menu{display:none}
}
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div class="nike-logo"><svg viewBox="0 0 69 32"><path d="M68.56 4.05c-.28-.12-.57-.2-.87-.25-.3-.04-.62-.06-.96-.04-.33.02-.67.08-1.02.18s-.68.24-.99.42c-.32.18-.6.4-.86.66l-21.55 21.6L8.77.78C7.84-.18 6.7-.55 5.58.35L.14 4.88c-.63.5-.65 1.3.04 1.7l31.56 24.18c.45.35.94.55 1.45.6.5.06 1.04-.05 1.6-.32L68.56 6.97c.67-.33.67-2.58 0-2.92z"/></svg></div>
    <div class="social"><a href="#">FB</a><a href="#">TW</a><a href="#">INS</a></div>
  </div>
  <div class="right">
    <div class="nav-top">
      <ul class="nav-menu">
        <li><a href="#">MEN <span class="arr">▾</span></a></li>
        <li><a href="#" class="active">WOMEN <span class="arr">▾</span></a></li>
        <li><a href="#">KIDS <span class="arr">▾</span></a></li>
        <li><a href="#">CUSTOMIZE</a></li>
      </ul>
      <div class="nav-icons">
        <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></button>
        <button class="hamburger-btn"><svg width="16" height="16" viewBox="0 0 24 24"><rect y="4" width="24" height="2" rx="1"/><rect y="11" width="24" height="2" rx="1"/><rect y="18" width="24" height="2" rx="1"/></svg></button>
      </div>
    </div>
    <div class="content">
      <div class="content-label">Women's Shoe</div>
      <h1 class="content-title">Nike</h1>
      <p class="content-desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
      <button class="shop-btn">SHOP NOW</button>
      <div class="thumbs">
        <button class="thumb-arrow">‹</button>
        <div class="thumb active"><img src="shoe.png" alt="Nike shoe"></div>
        <div class="thumb"><img src="shoe.png" alt="Nike shoe" style="opacity:.5"></div>
        <button class="thumb-arrow">›</button>
      </div>
    </div>
  </div>
  <div class="shoe-hero">
    <div class="yellow-circle">
      <img class="shoe-img" src="shoe.png" alt="Nike M2K Tekno">
    </div>
  </div>
</div>
<a href="https://kokogeorge023.github.io/portfolio/" class="back-link">← Back to Portfolio</a>
</body>
</html>
