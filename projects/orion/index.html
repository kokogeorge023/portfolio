<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orion Platform | Designed by Kyrillos George</title>
<style>*{margin:0;padding:0;box-sizing:border-box}@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');body{font-family:'Inter',sans-serif;overflow-x:hidden}
body{background:#0a1a0a;color:#4ade80}
nav{display:flex;justify-content:space-between;align-items:center;padding:24px 60px;position:fixed;width:100%;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px)}
.logo{font-size:1.3rem;font-weight:900;letter-spacing:2px;color:#fff}
.nav-links{display:flex;gap:28px;list-style:none;font-size:.8rem;letter-spacing:1px;text-transform:uppercase}
.nav-links a{color:rgba(255,255,255,0.7);text-decoration:none;transition:.3s}.nav-links a:hover{color:#fff}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;padding:100px 24px}
.hero-emoji{font-size:8rem;margin-bottom:24px;filter:drop-shadow(0 20px 40px rgba(0,0,0,0.3));animation:bounce 3s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.hero-title{font-size:clamp(3rem,10vw,7rem);font-weight:900;line-height:.9;letter-spacing:-3px;margin-bottom:24px;color:#4ade80}
.hero-desc{max-width:500px;font-size:1rem;line-height:1.8;opacity:.7;margin-bottom:40px}
.cta-btn{padding:16px 40px;background:#4ade80;color:#000;border:none;font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:1px;border-radius:100px;transition:.3s;text-transform:uppercase}
.cta-btn:hover{transform:scale(1.05);box-shadow:0 10px 40px #4ade8044}
.cards{padding:80px 60px}
.cards h2{font-size:2rem;text-align:center;margin-bottom:48px;color:#4ade80}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:900px;margin:0 auto}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px;text-align:center;transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-8px);border-color:#4ade80;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
.card h3{font-size:1.1rem;font-weight:700;margin-bottom:8px}
.card p{font-size:1.2rem;font-weight:800;color:#4ade80}
footer{padding:40px 60px;text-align:center;opacity:.4;font-size:.8rem;border-top:1px solid rgba(255,255,255,0.1)}
.back-link{position:fixed;bottom:24px;right:24px;padding:12px 24px;background:#6c63ff;color:#fff;border-radius:100px;font-size:.85rem;font-weight:600;text-decoration:none;z-index:100;transition:.3s}.back-link:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(108,99,255,0.4)}
@media(max-width:768px){nav{padding:16px 24px}.card-grid{grid-template-columns:1fr}.cards{padding:60px 24px}}
</style></head><body>
<nav><div class="logo">ORION</div><ul class="nav-links"><li><a href="#">Home</a></li><li><a href="#">About</a></li><li><a href="#">Products</a></li><li><a href="#">Contact</a></li></ul></nav>
<section class="hero"><div class="hero-emoji">🌟</div><h1 class="hero-title">ORION</h1><p class="hero-desc">Dark innovation platform. Technology solutions that illuminate the path forward.</p><button class="cta-btn">Explore More</button></section>
<section class="cards"><h2>Featured</h2><div class="card-grid"><div class="card"><h3>Cloud</h3><p>Scalable</p></div><div class="card"><h3>Security</h3><p>Enterprise</p></div><div class="card"><h3>API</h3><p>RESTful</p></div></div></section>
<footer>&copy; 2026 Orion Platform - UI Design by Kyrillos George</footer>
<a href="https://kokogeorge023.github.io/portfolio/" class="back-link">← Back to Portfolio</a>
</body></html>
